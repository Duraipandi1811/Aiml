<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Setup Workspace</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet" href="css/onboarding.css">

</head>

<body>

<div class="onboarding-page">

<div class="setup-card">

<div class="logo-box">

<i class='bx bxs-hexagon'></i>

</div>

<h1>Welcome to OpsAgent</h1>

<p class="subtitle">

Complete these three simple steps to activate your AI-powered facility management workspace.

</p>

<div class="steps">

<div class="step active">

<div class="step-icon">

<i class='bx bx-buildings'></i>

</div>

<h3>Add Organization</h3>

<p>Create your company workspace.</p>

</div>

<div class="line"></div>

<div class="step">

<div class="step-icon">

<i class='bx bx-data'></i>

</div>

<h3>Connect Data</h3>

<p>Import facility information.</p>

</div>

<div class="line"></div>

<div class="step">

<div class="step-icon">

<i class='bx bx-bot'></i>

</div>

<h3>Activate AI Agents</h3>

<p>Enable intelligent automation.</p>

</div>

</div>

<div class="progress">

<div class="progress-fill"></div>

</div>

<button id="startBtn" class="btn">

Let's Get Started

<i class='bx bx-right-arrow-alt'></i>

</button>

</div>

</div>

<script src="js/onboarding.js"></script>

</body>

</html>
